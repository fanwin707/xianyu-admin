<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>登录 · 闲鱼AI自动化交付平台</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
<style>
  body{background:linear-gradient(135deg,#ff6900 0%,#ff9500 50%,#ffb347 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:'Microsoft YaHei',sans-serif;}
  .login-card{background:#fff;border-radius:20px;box-shadow:0 20px 60px rgba(0,0,0,.18);padding:48px 40px;width:100%;max-width:420px;}
  .brand-icon{width:64px;height:64px;background:linear-gradient(135deg,#ff6900,#ff9500);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;}
  .brand-icon i{font-size:32px;color:#fff;}
  h2{text-align:center;font-weight:700;color:#2c2c2c;margin-bottom:4px;}
  .subtitle{text-align:center;color:#888;font-size:14px;margin-bottom:32px;}
  .form-control{border-radius:10px;padding:12px 16px;border:1.5px solid #e0e0e0;font-size:15px;}
  .form-control:focus{border-color:#ff6900;box-shadow:0 0 0 3px rgba(255,105,0,.15);}
  .btn-login{background:linear-gradient(135deg,#ff6900,#ff9500);border:none;border-radius:10px;padding:13px;font-size:16px;font-weight:600;color:#fff;width:100%;margin-top:8px;transition:.2s;}
  .btn-login:hover{opacity:.9;transform:translateY(-1px);}
  .form-label{font-weight:600;color:#444;font-size:14px;}
  .alert-danger{border-radius:10px;font-size:14px;}
  .input-group-text{background:#f8f8f8;border:1.5px solid #e0e0e0;border-radius:10px 0 0 10px;color:#888;}
  .hint{margin-top:20px;padding:12px 16px;background:#fff8f0;border-radius:10px;border-left:3px solid #ff6900;font-size:13px;color:#666;}
  .hint strong{color:#ff6900;}
</style>
</head>
<body>
<div class="login-card">
  <div class="brand-icon"><i class="bi bi-robot"></i></div>
  <h2>闲鱼AI自动化交付平台</h2>
  <p class="subtitle">Xianyu AI Auto-Delivery System</p>

  {% if error %}
  <div class="alert alert-danger"><i class="bi bi-exclamation-circle me-2"></i>{{ error }}</div>
  {% endif %}

  <form method="post" action="/login">
    <div class="mb-3">
      <label class="form-label">账号</label>
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-person"></i></span>
        <input type="text" name="username" class="form-control" placeholder="请输入账号" required style="border-radius:0 10px 10px 0;border-left:none;">
      </div>
    </div>
    <div class="mb-4">
      <label class="form-label">密码</label>
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-lock"></i></span>
        <input type="password" name="password" class="form-control" placeholder="请输入密码" required style="border-radius:0 10px 10px 0;border-left:none;">
      </div>
    </div>
    <button type="submit" class="btn btn-login"><i class="bi bi-box-arrow-in-right me-2"></i>登录系统</button>
  </form>

  <div class="hint">
    <strong>测试账号：</strong>admin &nbsp;/&nbsp; <strong>密码：</strong>demo2026<br>
    <strong>备用账号：</strong>test &nbsp;/&nbsp; <strong>密码：</strong>test123
  </div>
</div>
</body>
</html>
